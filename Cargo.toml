[package]
name = "hypersolve"
version = "0.1.0"
edition = "2024"
description = "Hyperreal-backed nonlinear solving and constraint evaluation"
authors = ["Timothy Schmidt <timschmidt@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/timschmidt/hypersolve"
readme = "README.md"
keywords = ["solver", "constraints", "hyperreal", "numerics", "cad"]
categories = ["mathematics", "science", "algorithms"]

[dependencies]
hyperreal = { path = "../hyperreal", version = "0.11.1", default-features = false }
hyperlattice = { path = "../hyperlattice", version = "0.4.0", default-features = false }
hyperlimit = { path = "../hyperlimit", version = "0.2.0", default-features = false }

[dev-dependencies]
criterion = "0.5"
proptest = "1.7.0"

[[bench]]
name = "certification"
harness = false
